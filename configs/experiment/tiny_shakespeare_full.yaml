project:
  name: geometry-data-selection-tiny-shakespeare

paths:
  data_dir: data
  artifacts_dir: artifacts_tiny_shakespeare

dataset:
  name: tiny_shakespeare
  type: text
  block_size: 256
  val_fraction: 0.1
  split_seed: 42

scoring:
  methods:
    - effective_rank
    - intrinsic_dimensionality_twonn
    - corr_integral
    - perplexity_filtering
    - semantic_dedup
    - heuristic_filtering
    - llm_classifier
    - random
  random_seed: 777
  num_epochs: 10
  lr: 0.001
  batch_size: 256
  num_workers: 8

subsets:
  # Retention budgets: 100%, 70%, 30%, 10% of training data
  percentiles: [0, 10, 20, 30, 50, 70, 90]
  # "remove_easy" = remove low-score samples first (keep hard/complex)
  # "remove_hard" = remove high-score samples first (keep easy/clean)
  direction: remove_easy

training:
  # Matches Karpathy's nanoGPT train_shakespeare_char.py
  # 5000 iters → batch_size=64 with ~3500 chunks → ~90 epochs
  model: nano_gpt
  seeds:
    - 32
    - 64
    - 128
  max_epochs: 100
  early_stopping_patience: 15
  batch_size: 64
  num_workers: 8
  # Karpathy: AdamW, lr=1e-3, weight_decay=0.1, beta2=0.99
  lr: 0.001
  min_lr: 0.0001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.99
  warmup_fraction: 0.02
  gradient_clip_val: 1.0
  accelerator: gpu
  devices: 1
  deterministic: warn
  save_checkpoints: false

analysis:
  primary_metric: loss
  plot_dpi: 150
