project:
  name: geometry-data-selection-cifar10

paths:
  data_dir: data
  artifacts_dir: artifacts_cifar10

dataset:
  name: cifar10
  split_seed: 42
  train_size: 40000
  val_size: 10000
  num_classes: 10
  in_channels: 3
  image_size: 32

scoring:
  methods:
    - effective_rank
    - random
  random_seed: 777
  model: resnet18
  num_epochs: 5
  seeds:
    - 42
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  batch_size: 128
  num_workers: 4

subsets:
  # Retention budgets: 100%, 70%, 30%, 10% of training data
  percentiles: [0, 30, 70, 90]

training:
  model: resnet18
  seeds:
    - 101
  max_epochs: 15
  early_stopping_patience: 5
  batch_size: 128
  num_workers: 4
  lr: 0.001
  weight_decay: 0.0001
  accelerator: auto
  devices: 1
  deterministic: warn

analysis:
  primary_metric: accuracy
  plot_dpi: 150
